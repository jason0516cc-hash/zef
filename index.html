<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zephyrax</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    @font-face {
      font-family: 'UbuntuCustom';
      src: url('/4iCv6KVjbNBYlgoCxCvjsGyN.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1ea761;
      overflow: hidden;
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      user-select: none;
    }

    canvas#c {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 55;
      pointer-events: none;
    }

    #game-ui { position: relative; z-index: 10; }
    .ui-element { position: fixed; pointer-events: auto; }

    .tooltip {
      position: absolute;
      background: rgba(8, 12, 24, 0.95);
      border: 2px solid #ffffff;
      border-radius: 8px;
      padding: 12px;
      color: #ffffff;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.4;
      max-width: 250px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease;
      z-index: 20;
    }
    .tooltip.visible { opacity: 1; }

    /* ── Home screen ── */
    #home-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 30vh;
      pointer-events: none;
    }

    /* layer 0: scrolling triangle grid */
    #bg-grid-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* layer 1: spiral mobs */
    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .home-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
    }

    #flower-canvas {
      flex-shrink: 0;
      width: 90px;
      height: 90px;
      cursor: none;
    }

    .flower-col {
      position: absolute;
      right: calc(100% + 28px);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .home-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* sub-column: title + label + input, all same width */
    .name-input-col {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: clamp(160px, 24vw, 280px);
      gap: 4px;
    }

    .game-title {
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-weight: 700;
      font-size: clamp(26px, 4.4vw, 46px);
      color: #ffffff;
      letter-spacing: 1px;
      text-align: center;
      -webkit-text-stroke: 3px #000000;
      paint-order: stroke fill;
      text-shadow: none;
      line-height: 1.15;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .name-label {
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-size: 13px;
      color: #ffffffcc;
      font-weight: 400;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      margin-bottom: -2px;
    }

    /* name + play on one row */
    .name-play-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #player-name-input {
      background: #ffffff;
      border: 3px solid #000000;
      border-radius: 4px;
      padding: 9px 16px;
      font-size: 15px;
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      width: 100%;
      text-align: center;
      outline: none;
      color: #111;
      transition: border-color 0.15s;
    }
    #player-name-input:focus {
      border-color: #167a48;
      box-shadow: 0 0 0 3px rgba(30, 167, 97, 0.28);
    }

    #play-btn {
      background: #178a50;
      border: 2px solid #0f5e35;
      color: #ffffff;
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-weight: 700;
      font-size: 18px;
      padding: 9px 22px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    #play-btn:hover  { background: #1daa60; transform: scale(1.04); }
    #play-btn:active { transform: scale(0.97); }

    /* ── Home-screen level pill ── */
    #home-level-pill {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 8px;
      pointer-events: none;
    }
    #home-level-pill-text {
      background: #333333;
      border-radius: 999px;
      padding: 5px 18px;
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-weight: 900;
      font-size: 14px;
      color: #e2eb67;
      -webkit-text-stroke: 0.4px rgba(0,0,0,0.6);
      paint-order: stroke fill;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    /* ── Homescreen stat preview ── */
    .home-stats {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .stat {
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      white-space: nowrap;
    }
    .hp-stat  { color: #ff4d4d; }
    .hp-stat strong  { color: #ff8080; }
    .dmg-stat { color: #ffaa44; }
    .dmg-stat strong { color: #ffcc88; }

    /* ── Transition canvas ── */
    #transition-canvas {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      pointer-events: none;
    }

    /* ── Death overlay ── */
    #death-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0, 0, 0, 0.52);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transform: translateY(-110%);
      opacity: 0;
      transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity   0.30s ease;
      pointer-events: auto;
    }

    #death-continue {
      background: #1ea761;
      border: 3px solid #0f5e35;
      color: #ffffff;
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-weight: 700;
      font-size: 22px;
      padding: 14px 52px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    #death-continue:hover  { background: #27c872; transform: scale(1.04); }
    #death-continue:active { transform: scale(0.97); }

    #death-close {
      background: #5a5a5a;
      border: 2px solid #3a3a3a;
      color: #cccccc;
      font-family: 'UbuntuCustom', 'Ubuntu', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 7px 26px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #death-close:hover  { background: #707070; transform: scale(1.04); }
    #death-close:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div id="home-screen">
    <canvas id="bg-grid-canvas"></canvas>
    <canvas id="bg-canvas"></canvas>

    <div class="home-content">
      <!-- Flower guy on the left with stats below him -->
      <div class="flower-col">
        <canvas id="flower-canvas" width="90" height="90"></canvas>
        <div class="home-stats">
          <span class="stat hp-stat">❤ <strong id="stat-hp">100</strong> HP</span>
          <span class="stat dmg-stat">⚔ <strong id="stat-dmg">25</strong> Body DMG</span>
        </div>
      </div>

      <!-- Center: title, label, input row -->
      <div class="home-center">
        <div class="name-play-row">
          <div class="name-input-col">
            <h1 class="game-title">Zephyrax.pro</h1>
            <p class="name-label">This pretty flower is called...</p>
            <input
              type="text"
              id="player-name-input"
              maxlength="24"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <button id="play-btn">Play</button>
        </div>

        <!-- ── Level pill: lives between name row and the hotbar ── -->
        <div id="home-level-pill">
          <span id="home-level-pill-text">Lvl 1 &mdash; 0 / 80 XP</span>
        </div>
      </div>
    </div>
  </div>

  <canvas id="transition-canvas"></canvas>
  <div id="ui"></div>
  <div id="tooltip" class="ui-element tooltip"></div>
  <canvas id="c"></canvas>

  <!-- Death overlay -->
  <div id="death-overlay">
    <button id="death-continue">Continue</button>
    <button id="death-close">Close</button>
  </div>

  <script type="module" src="/src/main.js?v=2"></script>
  <script type="module" src="/src/homescreen.js?v=2"></script>

</body>
</html>
